name: Backend CI MPP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main] # Se activa al subir a estas ramas

jobs:
  check-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Revisar estilo de código
        run: npm run lint
        continue-on-error: true

      - name: Verificar tipos y sintaxis
        run: npx tsc --noEmit

      - name: Compilar proyecto (Build)
        run: npm run build
